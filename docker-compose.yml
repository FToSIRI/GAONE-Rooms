services:
  app:
    build:
      context: ./app
    environment:
      NODE_ENV: production
      DOMAIN: ${DOMAIN}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      SRS_API_BASE: http://srs:1985
      DATA_DIR: /data
    ports:
      - "127.0.0.1:3000:3000/tcp"
    volumes:
      - ./data:/data
    depends_on:
      - srs
    restart: unless-stopped

  srs:
    build:
      context: ./srs
    environment:
      RTC_CANDIDATE: ${RTC_CANDIDATE}
      HOOKS_URL: http://app:3000/hooks
    ports:
      - "127.0.0.1:1985:1985/tcp"
      - "1935:1935/tcp"
      - "8000:8000/udp"
      - "8000:8000/tcp"
    restart: unless-stopped

  caddy:
    image: caddy:2.8
    profiles:
      - caddy
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "${CADDY_HTTP_PORT:-80}:80/tcp"
      - "${CADDY_HTTPS_PORT:-443}:443/tcp"
      - "${CADDY_HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
      - ./caddy/config:/config
    depends_on:
      - app
      - srs
    restart: unless-stopped
